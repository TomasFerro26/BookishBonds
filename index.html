<!DOCTYPE html>
<html lang="pt">
<head>
<meta charset="UTF-8">
<style>
*{box-sizing:border-box;margin:0;padding:0}
body{font-family:'Trebuchet MS',sans-serif;background:#fdf6ec;min-height:100vh;display:flex;flex-direction:column;align-items:center;justify-content:center;padding:16px}
.screen{width:100%;max-width:600px;display:none;flex-direction:column;align-items:center;gap:14px}
.screen.active{display:flex}
.logo{font-size:2.4rem;font-weight:900;color:#6b3a1f;text-align:center;line-height:1.1;text-shadow:2px 2px 0 #e8c99a}
.sub{font-size:1rem;color:#8a5c3a;font-weight:700;letter-spacing:.05em}
.card{background:#fff;border-radius:20px;border:2.5px solid #e8c99a;padding:28px 24px;width:100%;display:flex;flex-direction:column;gap:14px;align-items:center}
.lbl{font-size:1rem;font-weight:800;color:#6b3a1f;text-align:center}
input[type=text],input[type=password]{width:100%;border:2px solid #e8c99a;border-radius:12px;padding:11px 14px;font-size:1.05rem;font-family:inherit;font-weight:700;color:#3d1f08;background:#fdf6ec;outline:none;text-align:center}
input:focus{border-color:#a0632a}
.btn{background:#6b3a1f;color:#fdf6ec;border:none;border-radius:50px;padding:13px 44px;font-size:1.1rem;font-family:inherit;font-weight:900;cursor:pointer;transition:transform .15s,background .15s;width:100%}
.btn:hover{background:#4e2910;transform:scale(1.03)}
.btn.sec{background:#e8c99a;color:#4e2910}.btn.sec:hover{background:#d4b080}
.btn.danger{background:#c0392b}.btn.danger:hover{background:#a93226}
.divider{width:100%;height:2px;background:#e8c99a;border-radius:2px}
.q-bar{width:100%;display:flex;align-items:center;justify-content:space-between}
.q-cnt{font-size:.9rem;font-weight:800;color:#8a5c3a}
.score-badge{background:#6b3a1f;color:#fdf6ec;border-radius:50px;padding:5px 18px;font-size:.95rem;font-weight:900}
.timer-wrap{width:100%;height:14px;background:#e8c99a;border-radius:50px;overflow:hidden}
.timer-fill{height:100%;background:#a0632a;border-radius:50px}
.q-bubble{background:#6b3a1f;color:#fdf6ec;border-radius:20px;padding:22px 24px;width:100%;text-align:center;font-size:1.15rem;font-weight:800;line-height:1.4;min-height:90px;display:flex;align-items:center;justify-content:center}
.answers-grid{display:grid;grid-template-columns:1fr 1fr;gap:12px;width:100%}
.ans-btn{border:none;border-radius:16px;padding:18px 14px;font-size:.95rem;font-family:inherit;font-weight:800;cursor:pointer;color:#fff;text-align:left;min-height:70px;display:flex;align-items:center;gap:10px;line-height:1.3;transition:transform .1s}
.ans-btn:hover:not(:disabled){transform:scale(1.03)}
.ans-btn:disabled{cursor:default}
.ans-btn.a{background:#c0392b}.ans-btn.b{background:#2980b9}
.ans-btn.c{background:#27ae60}.ans-btn.d{background:#f39c12}
.ans-letter{width:30px;height:30px;min-width:30px;border-radius:50%;background:rgba(255,255,255,.25);display:flex;align-items:center;justify-content:center;font-weight:900;font-size:.95rem}
.ans-btn.reveal{animation:pop .4s;filter:brightness(1.15)}
.ans-btn.fade{opacity:.35}
@keyframes pop{0%{transform:scale(1)}50%{transform:scale(1.08)}100%{transform:scale(1)}}
.fb-wrap{min-height:56px;display:flex;flex-direction:column;align-items:center;justify-content:center;gap:6px}
.fb{font-size:1.4rem;font-weight:900;padding:9px 28px;border-radius:50px;text-align:center}
.fb.ok{background:#27ae60;color:#fff}.fb.ko{background:#c0392b;color:#fff}
.pts-flash{font-size:1rem;font-weight:800;color:#6b3a1f}
.lb-list{width:100%;display:flex;flex-direction:column;gap:8px}
.lb-row{display:flex;align-items:center;gap:12px;background:#fff;border:2.5px solid #e8c99a;border-radius:16px;padding:11px 15px}
.lb-rank{font-size:1.3rem;font-weight:900;width:34px;text-align:center}
.lb-name{flex:1;font-size:1rem;font-weight:800;color:#3d1f08}
.lb-pts{font-size:1rem;font-weight:900;color:#a0632a}
.m1{color:#f39c12}.m2{color:#95a5a6}.m3{color:#cd7f32}
.result-bar{width:100%;background:#fff;border:2.5px solid #e8c99a;border-radius:16px;padding:14px 18px;display:flex;flex-direction:column;gap:6px}
.result-row{display:flex;justify-content:space-between;font-size:.95rem;font-weight:700;color:#4e2910}
.result-val{font-weight:900;color:#6b3a1f}
.err{color:#c0392b;font-size:.9rem;font-weight:700;text-align:center;min-height:18px}
.overlay{display:none;position:fixed;inset:0;background:rgba(0,0,0,.45);z-index:999;align-items:center;justify-content:center}
.overlay.active{display:flex}
.modal{background:#fdf6ec;border-radius:20px;border:2.5px solid #e8c99a;padding:28px 24px;width:90%;max-width:360px;display:flex;flex-direction:column;gap:14px;align-items:center}
</style>
</head>
<body>

<!-- HOME -->
<div class="screen active" id="s-home">
  <div style="font-size:2rem;text-align:center">📚 📖 📚</div>
  <div class="logo">Bookish Bonds<br>Challenge</div>
  <div class="sub">QUIZ</div>
  <div class="card">
    <div class="lbl">O teu nome ou nickname</div>
    <input type="text" id="player-name" placeholder="ex: Leitora Voraz" maxlength="24">
    <button class="btn" onclick="startGame()">Começar →</button>
    <div style="font-size:.8rem;color:#a07850;font-weight:700;text-align:center">Responde rápido — quanto mais rápido, mais pontos!</div>
  </div>
  <div class="divider"></div>
  <div style="width:100%">
    <div style="font-size:1rem;font-weight:900;color:#6b3a1f;text-align:center;margin-bottom:10px">🏆 Leaderboard</div>
    <div class="lb-list" id="home-lb"></div>
    <div id="home-lb-empty" style="text-align:center;font-size:.85rem;color:#a07850;font-weight:700;padding:6px">Ainda sem resultados — sê o primeiro!</div>
  </div>
</div>

<!-- QUIZ -->
<div class="screen" id="s-quiz">
  <div class="q-bar">
    <div class="q-cnt" id="q-counter">Pergunta 1/10</div>
    <div class="score-badge" id="q-score">0 pts</div>
  </div>
  <div class="timer-wrap"><div class="timer-fill" id="timer-bar" style="width:100%"></div></div>
  <div class="q-bubble" id="q-text"></div>
  <div class="answers-grid" id="answers-grid"></div>
  <div class="fb-wrap" id="feedback-area"></div>
</div>

<!-- RESULTS -->
<div class="screen" id="s-results">
  <div style="font-size:2rem;text-align:center">🎉</div>
  <div class="logo" style="font-size:1.8rem">Resultado Final</div>
  <div class="result-bar" id="result-summary"></div>
</div>

<!-- LEADERBOARD -->
<div class="screen" id="s-lb">
  <div style="font-size:2rem;text-align:center">🏆</div>
  <div class="logo" style="font-size:1.8rem">Leaderboard</div>
  <div class="lb-list" id="full-lb"></div>
  <div style="display:flex;flex-direction:column;gap:10px;width:100%;max-width:300px;margin-top:4px">
    <button class="btn sec" onclick="showScreen('s-home')">↩ Menu Principal</button>
    <button class="btn danger" onclick="openClearModal()">🗑 Limpar Scores</button>
  </div>
</div>

<!-- CLEAR MODAL -->
<div class="overlay" id="modal-overlay">
  <div class="modal">
    <div style="font-size:1.2rem;font-weight:900;color:#6b3a1f">🔒 Confirmar Limpeza</div>
    <div style="font-size:.9rem;font-weight:700;color:#8a5c3a;text-align:center">Introduz a password de administrador para apagar todos os scores.</div>
    <input type="password" id="admin-pw" placeholder="Password">
    <div class="err" id="pw-err"></div>
    <button class="btn danger" onclick="confirmClear()">Apagar Tudo</button>
    <button class="btn sec" onclick="closeModal()">Cancelar</button>
  </div>
</div>

<script src="https://cdnjs.cloudflare.com/ajax/libs/firebase/10.12.2/firebase-app-compat.min.js"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/firebase/10.12.2/firebase-database-compat.min.js"></script>
<script>
// ── CONFIG ──────────────────────────────────────────────
const QUESTIONS = [
  {q:"Qual é a duração total do desafio Bookish Bonds?",opts:["2 meses","4 meses","6 meses","1 mês"],ans:1},
  {q:"Quando termina oficialmente o desafio?",opts:["30 Abr","31 Maio","30 Jun","15 Maio"],ans:1},
  {q:"Qual é o mínimo de páginas que deves ler antes de recomendar ou trocar um livro?",opts:["10 páginas","20 páginas","30 páginas","50 páginas"],ans:2},
  {q:"Quantos pontos ganhas ao completar o mini-desafio semanal?",opts:["+2 pontos","+5 pontos","+1 ponto","+10 pontos"],ans:3},
  {q:"Quantos pontos ganhas ao convidar um novo colega para o desafio?",opts:["+10 pontos","+5 pontos","+2 pontos","+1 ponto"],ans:1},
  {q:"O Bookish Bonds funciona com base em quantos pilares principais?",opts:["2 pilares","4 pilares","3 pilares","5 pilares"],ans:2},
  {q:"Quando são lançados os mini-desafios semanais?",opts:["À sexta-feira","À segunda-feira","Ao domingo","À quarta-feira"],ans:1},
  {q:"Até quando podes participar num mini-desafio semanal?",opts:["Até sábado às 23h59","Até sexta às 18h00","Até domingo às 00h00","Até quinta às 12h00"],ans:2},
  {q:"Quantos pontos ganhas ao recomendar um livro que o colega aceita e lê 30+ páginas?",opts:["+1 ponto","+10 pontos","+5 pontos","+2 pontos"],ans:3},
  {q:"Qual é o prémio especial, além dos 3 primeiros classificados?",opts:["Quem fizer mais trocas","Quem ler mais livros completos","Quem completar todos os mini-desafios","Quem convidar mais colegas"],ans:1}
];
const TIME_LIMIT = 15;
const MAX_PTS    = 1000;
const ADMIN_PW   = 'bookishbonds2025';
const LETTERS    = ['A','B','C','D'];
const COLORS     = ['a','b','c','d'];
const MEDALS     = ['🥇','🥈','🥉'];
const MEDAL_CLS  = ['m1','m2','m3'];


// ── FIREBASE ─────────────────────────────────────────────
firebase.initializeApp({
  apiKey:"AIzaSyD4VXvIGeEg5ijQUZCpiDrfWPb8w2qkE7U",
  authDomain:"bookish-bonds.firebaseapp.com",
  databaseURL:"https://bookish-bonds-default-rtdb.europe-west1.firebasedatabase.app",
  projectId:"bookish-bonds",
  storageBucket:"bookish-bonds.firebasestorage.app",
  messagingSenderId:"1039293092492",
  appId:"1:1039293092492:web:318e5779e319765f54a1a9"
});
const db       = firebase.database();
const lbRef    = db.ref('bbq_solo_lb');
const resetRef = db.ref('bbq_reset_ts'); // kept for clear scores functionality

// ── STATE ─────────────────────────────────────────────────
let playerName = '';
let score      = 0;
let qIdx       = 0;
let answered   = false;
let correct    = 0;
let timerInterval = null;
let timeLeft   = 0;

// ── UTILS ─────────────────────────────────────────────────
function showScreen(id) {
  document.querySelectorAll('.screen').forEach(s => s.classList.remove('active'));
  document.getElementById(id).classList.add('active');
}



function renderLB(containerId, scores, highlightName) {
  const list = document.getElementById(containerId);
  if (!list) return;
  list.innerHTML = '';
  scores.slice(0, 10).forEach((s, i) => {
    const row = document.createElement('div');
    row.className = 'lb-row';
    if (s.name === highlightName) row.style.border = '2.5px solid #a0632a';
    const rank = i < 3
      ? `<span class="lb-rank ${MEDAL_CLS[i]}">${MEDALS[i]}</span>`
      : `<span class="lb-rank" style="color:#8a5c3a">${i+1}</span>`;
    row.innerHTML = `${rank}<span class="lb-name">${s.name}</span><span class="lb-pts">${s.score} pts</span>`;
    list.appendChild(row);
  });
}

async function fetchAndRenderLB(containerId, highlightName) {
  try {
    const snap = await lbRef.once('value');
    const scores = [];
    snap.forEach(c => {
      const v = c.val();
      if (v && typeof v.name === 'string' && typeof v.score === 'number') {
        scores.push(v);
      }
    });
    scores.sort((a, b) => b.score - a.score);
    const empty = document.getElementById('home-lb-empty');
    if (empty) empty.style.display = scores.length ? 'none' : 'block';
    renderLB(containerId, scores, highlightName);
    return scores;
  } catch(e) {
    console.error('LB fetch error:', e);
    return [];
  }
}

// ── HOME INIT ─────────────────────────────────────────────
fetchAndRenderLB('home-lb', null);

// ── GAME START ────────────────────────────────────────────
async function startGame() {
  const n = document.getElementById('player-name').value.trim();
  if (!n) { document.getElementById('player-name').focus(); return; }
  playerName = n;
  score = 0; qIdx = 0; correct = 0; answered = false;
  showScreen('s-quiz');
  loadQuestion();
}

// ── QUESTION ──────────────────────────────────────────────
function loadQuestion() {
  answered = false;
  clearInterval(timerInterval);
  const q = QUESTIONS[qIdx];
  document.getElementById('q-counter').textContent = `Pergunta ${qIdx + 1}/${QUESTIONS.length}`;
  document.getElementById('q-score').textContent   = `${score} pts`;
  document.getElementById('q-text').textContent    = q.q;
  document.getElementById('feedback-area').innerHTML = '';

  const grid = document.getElementById('answers-grid');
  grid.innerHTML = '';
  q.opts.forEach((opt, i) => {
    const btn = document.createElement('button');
    btn.className = `ans-btn ${COLORS[i]}`;
    btn.innerHTML = `<span class="ans-letter">${LETTERS[i]}</span>${opt}`;
    btn.addEventListener('click', () => answer(i));
    grid.appendChild(btn);
  });

  startTimer();
}

function startTimer() {
  timeLeft = TIME_LIMIT;
  const bar = document.getElementById('timer-bar');
  bar.style.width = '100%';
  clearInterval(timerInterval);
  timerInterval = setInterval(() => {
    timeLeft = Math.max(0, timeLeft - 0.1);
    bar.style.width = (timeLeft / TIME_LIMIT * 100) + '%';
    if (timeLeft <= 0) {
      clearInterval(timerInterval);
      timeout();
    }
  }, 100);
}

function disableAnswers() {
  document.querySelectorAll('.ans-btn').forEach(b => b.disabled = true);
}

function revealAnswer() {
  const btns = document.querySelectorAll('.ans-btn');
  btns.forEach((b, i) => {
    if (i === QUESTIONS[qIdx].ans) b.classList.add('reveal');
    else b.classList.add('fade');
  });
}

function scheduleNext() {
  const nextIdx = qIdx + 1;
  setTimeout(() => {
    if (nextIdx >= QUESTIONS.length) {
      endGame();
    } else {
      qIdx = nextIdx;
      loadQuestion();
    }
  }, 1800);
}

function answer(idx) {
  if (answered) return;
  answered = true;
  clearInterval(timerInterval);
  disableAnswers();

  const q = QUESTIONS[qIdx];
  const fb = document.getElementById('feedback-area');

  if (idx === q.ans) {
    const earned = Math.round(MAX_PTS * (0.4 + 0.6 * (timeLeft / TIME_LIMIT)));
    score += earned;
    correct++;
    document.querySelectorAll('.ans-btn')[idx].classList.add('reveal');
    document.querySelectorAll('.ans-btn').forEach((b, i) => { if (i !== idx) b.classList.add('fade'); });
    fb.innerHTML = `<div class="fb ok">✓ Correto!</div><div class="pts-flash">+${earned} pontos</div>`;
  } else {
    document.querySelectorAll('.ans-btn')[idx].classList.add('fade');
    document.querySelectorAll('.ans-btn')[q.ans].classList.add('reveal');
    document.querySelectorAll('.ans-btn').forEach((b, i) => { if (i !== idx && i !== q.ans) b.classList.add('fade'); });
    fb.innerHTML = `<div class="fb ko">✗ Errado!</div>`;
  }

  document.getElementById('q-score').textContent = `${score} pts`;
  scheduleNext();
}

function timeout() {
  if (answered) return;
  answered = true;
  disableAnswers();
  revealAnswer();
  document.getElementById('feedback-area').innerHTML = `<div class="fb ko">⏱ Tempo esgotado!</div>`;
  scheduleNext();
}

// ── END GAME ──────────────────────────────────────────────
async function endGame() {
  clearInterval(timerInterval);
  try {
    const entry = { name: String(playerName), score: Number(score), correct: Number(correct), total: Number(QUESTIONS.length) };
    await lbRef.push(entry);
  } catch(e) {
    console.error('Score save error:', e);
  }

  const scores = await fetchAndRenderLB('full-lb', playerName);
  const rank   = scores.findIndex(s => s.name === playerName && s.score === score) + 1;

  document.getElementById('result-summary').innerHTML = `
    <div class="result-row"><span>Jogador</span><span class="result-val">${playerName}</span></div>
    <div class="result-row"><span>Pontuação</span><span class="result-val">${score} pts</span></div>
    <div class="result-row"><span>Respostas certas</span><span class="result-val">${correct}/${QUESTIONS.length}</span></div>
    <div class="result-row"><span>Posição</span><span class="result-val">#${rank || '?'}</span></div>
  `;

  showScreen('s-lb');
}

// ── MODAL ─────────────────────────────────────────────────
function openClearModal() {
  document.getElementById('admin-pw').value = '';
  document.getElementById('pw-err').textContent = '';
  document.getElementById('modal-overlay').classList.add('active');
  setTimeout(() => document.getElementById('admin-pw').focus(), 100);
}

function closeModal() {
  document.getElementById('modal-overlay').classList.remove('active');
}

async function confirmClear() {
  const pw = document.getElementById('admin-pw').value;
  if (pw !== ADMIN_PW) {
    document.getElementById('pw-err').textContent = 'Password incorreta.';
    return;
  }
  try {
    await Promise.all([lbRef.remove(), resetRef.set(Date.now())]);
    closeModal();
    document.getElementById('full-lb').innerHTML  = '';
    document.getElementById('home-lb').innerHTML  = '';
    document.getElementById('home-lb-empty').style.display = 'block';
    alert('✅ Scores apagados! As pessoas podem jogar novamente.');
  } catch(e) {
    document.getElementById('pw-err').textContent = 'Erro ao apagar. Tenta novamente.';
    console.error('Clear error:', e);
  }
}

// close modal on overlay click
document.getElementById('modal-overlay').addEventListener('click', function(e) {
  if (e.target === this) closeModal();
});

// enter key on password field
document.getElementById('admin-pw').addEventListener('keydown', e => {
  if (e.key === 'Enter') confirmClear();
});
</script>
</body>
</html>
